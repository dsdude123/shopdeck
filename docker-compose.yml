services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - ${DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shopdeck}
      POSTGRES_USER: ${POSTGRES_USER:-shopdeck}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopdeck -d shopdeck"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  django:
    build: .
    restart: unless-stopped
    entrypoint: ["/app/docker-entrypoint.sh"]
    command: gunicorn shopdeck.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
    volumes:
      - ${DATA_DIR:-./data}/static:/app/_static
      - ${DATA_DIR:-./data}/cdn:/app/cdn
      - ${DATA_DIR:-./data}/assetcdn:/app/assetcdn
    environment:
      - DJANGO_SETTINGS_MODULE=shopdeck.settings
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:?Set DJANGO_SECRET_KEY in .env}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-*}
      - POSTGRES_DB=${POSTGRES_DB:-shopdeck}
      - POSTGRES_USER=${POSTGRES_USER:-shopdeck}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - SOAP_URL=${SOAP_URL:-ecs.c.shop.nintendowifi.net}
      - METADATA_API_URL=${METADATA_API_URL:-ninja.ctr.shop.nintendo.net}
      - IN_MAINTENANCE=${IN_MAINTENANCE:-False}
      - TOS_ESHOP=${TOS_ESHOP:-}
      - WEBUI_NAME=${WEBUI_NAME:-Shopdeck}
      - MAINTENANCE_MSG=${MAINTENANCE_MSG:-Maintenance message.}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - RUN_MIGRATIONS=true
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  flask:
    build: .
    restart: unless-stopped
    entrypoint: ["/app/docker-entrypoint.sh"]
    command: gunicorn main:app --bind 0.0.0.0:5000 --workers 3 --timeout 120
    volumes:
      - ${DATA_DIR:-./data}/cdn:/app/cdn
      - ${DATA_DIR:-./data}/assetcdn:/app/assetcdn
    environment:
      - DJANGO_SETTINGS_MODULE=shopdeck.settings
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - POSTGRES_DB=${POSTGRES_DB:-shopdeck}
      - POSTGRES_USER=${POSTGRES_USER:-shopdeck}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - SOAP_URL=${SOAP_URL:-ecs.c.shop.nintendowifi.net}
      - METADATA_API_URL=${METADATA_API_URL:-ninja.ctr.shop.nintendo.net}
      - RUN_MIGRATIONS=false
    depends_on:
      db:
        condition: service_healthy
      django:
        condition: service_started
    expose:
      - "5000"

  nginx:
    build: ./nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ${DATA_DIR:-./data}/static:/app/_static:ro
      - ${DATA_DIR:-./data}/cdn:/app/cdn:ro
      - ${DATA_DIR:-./data}/assetcdn:/app/assetcdn:ro
    depends_on:
      - django
      - flask

  proxy:
    build: ./proxy
    restart: unless-stopped
    ports:
      - "${PROXY_PORT:-8888}:8888"
    depends_on:
      - django
      - flask
